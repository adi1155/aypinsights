# AYP Insights — Docker Compose for EasyPanel
#
# EasyPanel setup:
# 1. Create a new "Compose" app and point it at this repository.
# 2. Set the primary/public service to: app (port 80).
# 3. Add environment variables in the EasyPanel UI (see .env.example).
# 4. Set APP_URL to your public domain (e.g. https://insights.example.com).
# 5. Generate APP_KEY: php artisan key:generate --show (run locally once).
#
# Optional: mount a persistent volume for storage in the EasyPanel service editor.

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-AYP Insights}
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${APP_URL:-http://localhost}
  LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_CONNECTION: ${DB_CONNECTION:-mysql}
  DB_HOST: ${DB_HOST:-mysql}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:-ayp_insights}
  DB_USERNAME: ${DB_USERNAME:-ayp}
  DB_PASSWORD: ${DB_PASSWORD:-ayp_secret}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  CACHE_STORE: ${CACHE_STORE:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_PORT: ${REDIS_PORT:-6379}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME}
  MAIL_PASSWORD: ${MAIL_PASSWORD}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-insights@ayperp.net}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-AYP Insights}
  ERPNEXT_URL: ${ERPNEXT_URL:-https://gmp.ayperp.net}
  ERPNEXT_API_KEY: ${ERPNEXT_API_KEY}
  ERPNEXT_API_SECRET: ${ERPNEXT_API_SECRET}
  ERPNEXT_TIMEOUT: ${ERPNEXT_TIMEOUT:-90}
  ERPNEXT_USE_DUMMY_DATA: ${ERPNEXT_USE_DUMMY_DATA:-false}
  ERPNEXT_DEFAULT_COMPANY: ${ERPNEXT_DEFAULT_COMPANY:-GMP Foods (Pvt.) Ltd}
  ERPNEXT_DEFAULT_CURRENCY: ${ERPNEXT_DEFAULT_CURRENCY:-PKR}
  DASHBOARD_CACHE_TTL: ${DASHBOARD_CACHE_TTL:-600}
  CEO_MAX_EXECUTION: ${CEO_MAX_EXECUTION:-180}
  ERPNEXT_DB_HOST: ${ERPNEXT_DB_HOST:-}
  ERPNEXT_DB_PORT: ${ERPNEXT_DB_PORT:-3306}
  ERPNEXT_DB_DATABASE: ${ERPNEXT_DB_DATABASE:-}
  ERPNEXT_DB_USERNAME: ${ERPNEXT_DB_USERNAME:-}
  ERPNEXT_DB_PASSWORD: ${ERPNEXT_DB_PASSWORD:-}
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment: *app-environment
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ayp
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment: *app-environment
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ayp

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment: *app-environment
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ayp

  mysql:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-ayp_insights}
      MYSQL_USER: ${DB_USERNAME:-ayp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ayp_secret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ayp
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - ayp
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  ayp:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  app-storage:
  app-logs:
